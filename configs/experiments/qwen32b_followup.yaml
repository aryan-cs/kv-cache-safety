run:
  name: qwen32b_followup
  output_dir: results
  resume: false
model:
  provider: hf
  model_id: Qwen/Qwen2.5-32B-Instruct
  dtype: bfloat16
  device_map: auto
  trust_remote_code: false
  low_cpu_mem_usage: true
generation:
  max_new_tokens: 160
  temperature: 0.0
  top_p: 1.0
  do_sample: false
  capture_attentions: true
prompt_suites:
  - system_leakage
  - refusal_safety
  - benign_overrefusal
  - capability_smoke
cache_policies:
  - name: none
  - name: sliding_window
    budget: 128
  - name: attention_h2o
    budget: 128
    sink_tokens: 8
    recent_tokens: 32
  - name: policy_pinned
    budget: 128
    sink_tokens: 8
    protected_spans: [system, policy]
seeds: [0, 1, 2]
limit_per_suite: null
