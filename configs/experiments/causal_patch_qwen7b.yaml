run:
  name: causal_patch_qwen7b
  output_dir: results
  resume: false
model:
  provider: hf
  model_id: Qwen/Qwen2.5-7B-Instruct
  dtype: bfloat16
  device_map: auto
generation:
  max_new_tokens: 96
  temperature: 0.0
  top_p: 1.0
  do_sample: false
  capture_attentions: true
prompt_suites:
  - system_leakage
  - refusal_safety
cache_policies:
  - name: none
  - name: sliding_window
    budget: 128
  - name: kv_int8_sim
  - name: kv_int8_sim
    patch_from_baseline:
      token_indices: [0, 1, 2, 3, 4, 5, 6, 7]
  - name: policy_pinned
    budget: 128
    sink_tokens: 8
    protected_spans: [system, policy]
seeds: [0]
limit_per_suite: 5
