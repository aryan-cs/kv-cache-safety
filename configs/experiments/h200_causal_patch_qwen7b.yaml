run:
  name: h200_causal_patch_qwen7b
  output_dir: results
  resume: false
model:
  provider: hf
  model_id: Qwen/Qwen2.5-7B-Instruct
  dtype: bfloat16
  device_map: auto
  trust_remote_code: false
  low_cpu_mem_usage: true
generation:
  max_new_tokens: 128
  temperature: 0.0
  top_p: 1.0
  do_sample: false
  capture_attentions: false
prompt_suites:
  - system_leakage
  - public_refusal_safety
cache_policies:
  - name: none
  - name: kv_int4_sim
  - name: kv_int4_sim
    patch_from_baseline:
      token_indices: [0, 1, 2, 3, 4, 5, 6, 7]
      components: [key, value]
  - name: kv_int4_sim
    patch_from_baseline:
      token_indices: [0, 1, 2, 3, 4, 5, 6, 7]
      components: [key]
  - name: kv_int4_sim
    patch_from_baseline:
      token_indices: [0, 1, 2, 3, 4, 5, 6, 7]
      components: [value]
  - name: kv_int4_sim
    patch_from_baseline:
      token_indices: [32, 33, 34, 35, 36, 37, 38, 39]
      components: [key, value]
  - name: policy_pinned
    budget: 128
    sink_tokens: 8
    protected_spans: [system, policy]
seeds: [0, 1, 2]
limit_per_suite: null
