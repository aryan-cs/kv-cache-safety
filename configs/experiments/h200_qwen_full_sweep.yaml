run:
  name: h200_qwen_full_sweep
  output_dir: results
  resume: false
model:
  provider: hf
  model_id: Qwen/Qwen2.5-14B-Instruct
  dtype: bfloat16
  device_map: auto
  trust_remote_code: false
  low_cpu_mem_usage: true
generation:
  max_new_tokens: 160
  temperature: 0.0
  top_p: 1.0
  do_sample: false
  capture_attentions: true
prompt_suites:
  - system_leakage
  - refusal_safety
  - benign_overrefusal
  - instruction_following
  - capability_smoke
cache_policies:
  - name: none
  - name: sliding_window
    budget: 64
  - name: sliding_window
    budget: 128
  - name: sliding_window
    budget: 256
  - name: sink_recent
    budget: 128
    sink_tokens: 8
  - name: random_matched
    budget: 128
    seed: 991
  - name: attention_h2o
    budget: 128
    sink_tokens: 8
    recent_tokens: 32
  - name: kv_int8_sim
  - name: kv_int4_sim
  - name: policy_pinned
    budget: 128
    sink_tokens: 8
    protected_spans: [system, policy]
seeds: [0, 1, 2]
limit_per_suite: null
