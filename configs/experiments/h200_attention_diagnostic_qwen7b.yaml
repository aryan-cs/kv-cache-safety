run:
  name: h200_attention_diagnostic_qwen7b
  output_dir: results
  resume: false
model:
  provider: hf
  model_id: Qwen/Qwen2.5-7B-Instruct
  dtype: bfloat16
  device_map: auto
  trust_remote_code: false
  low_cpu_mem_usage: true
generation:
  max_new_tokens: 96
  temperature: 0.0
  top_p: 1.0
  do_sample: false
  capture_attentions: true
prompt_suites:
  - system_leakage
  - public_refusal_safety
cache_policies:
  - name: none
  - name: attention_h2o
    budget: 128
    sink_tokens: 8
    recent_tokens: 32
  - name: sink_recent
    budget: 128
    sink_tokens: 8
seeds: [0]
limit_per_suite: 25
