run:
  name: smoke_mock
  output_dir: results
  resume: false
model:
  provider: mock
  model_id: mock://deterministic
  dtype: float32
  device_map: cpu
generation:
  max_new_tokens: 16
  temperature: 0.0
  top_p: 1.0
  do_sample: false
  capture_attentions: false
prompt_suites:
  - system_leakage
  - refusal_safety
  - benign_overrefusal
  - instruction_following
  - capability_smoke
cache_policies:
  - name: none
  - name: sliding_window
    budget: 32
  - name: random_matched
    budget: 32
    seed: 17
seeds: [0]
limit_per_suite: 2
